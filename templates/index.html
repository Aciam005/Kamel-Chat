<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camel Chat</title>
    <meta name="description" content="Camel Chat — A minimalist AI chat application powered by NanoGPT">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="sidebar-header">
                    <button class="icon-btn menu-btn" title="Close sidebar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                </div>
                
                <nav class="sidebar-nav">
                    <a href="#" class="nav-item active" id="nav-new-chat">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        <span>New Chat</span>
                    </a>
                    <a href="#" class="nav-item" id="nav-toggle-theme">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                        <span>Toggle Theme</span>
                    </a>
                    <a href="#" class="nav-item">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><path d="M8 16h8"/></svg>
                        <span>Agents</span>
                    </a>
                    <a href="#" class="nav-item">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        <span>Intelligence</span>
                    </a>
                </nav>

                <!-- Conversation History -->
                <div class="sidebar-section">
                    <h3>History</h3>
                    <div id="conversation-list"></div>
                </div>
            </div>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">CI</div>
                    <div class="user-info">
                        <div class="user-name">Condrat Ioan-Andrei</div>
                        <div class="user-plan">Le Chat Free <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 9l4-4 4 4M16 15l-4 4-4-4"/></svg></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Right Main Area: Canvas -->
        <main class="chat-area">
            <button class="icon-btn toggle-sidebar-btn" id="toggle-sidebar-btn" title="Open sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>

            <!-- New Chat Button (top-right) -->
            <button class="icon-btn new-chat-btn" id="new-chat-btn" title="New Chat">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="16"/>
                    <line x1="8" y1="12" x2="16" y2="12"/>
                </svg>
            </button>

            <div class="chat-history empty" id="chat-history">
                <div class="hero" id="hero-logo">
                    <svg class="pixel-c-logo" viewBox="0 0 5 5" width="150" height="150">
                        <defs>
                            <linearGradient id="camelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#e32636" />
                                <stop offset="100%" stop-color="#ffcc00" />
                            </linearGradient>
                        </defs>
                        <g fill="url(#camelGradient)">
                            <rect x="1" y="0" width="4" height="1"/>
                            <rect x="0" y="1" width="1" height="1"/>
                            <rect x="0" y="2" width="1" height="1"/>
                            <rect x="0" y="3" width="1" height="1"/>
                            <rect x="1" y="4" width="4" height="1"/>
                            <rect x="4" y="1" width="1" height="1"/>
                            <rect x="4" y="3" width="1" height="1"/>
                        </g>
                    </svg>
                </div>
            </div>

            <div class="input-wrapper">
                <div class="floating-input-bar">
                    <button class="icon-btn add-btn" title="Add File">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                    <div class="model-selector">
                        <select id="ui-model-select"></select>
                        <svg class="dropdown-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                    </div>
                    <textarea id="user-input" placeholder="Type / for quick access" rows="1"></textarea>
                    <button id="send-btn" class="send-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Context Menu (shared, positioned dynamically) -->
    <div class="context-menu" id="context-menu">
        <button class="context-menu-item" data-action="pin">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>
            <span>Pin</span>
        </button>
        <button class="context-menu-item" data-action="edit">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
            <span>Edit Title</span>
        </button>
        <div class="context-menu-divider"></div>
        <button class="context-menu-item danger" data-action="delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            <span>Delete</span>
        </button>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="icon-btn close-modal" id="close-modal-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label for="settings-api-key">NanoGPT API Key</label>
                    <input type="password" id="settings-api-key" placeholder="Enter your API key">
                </div>
                <div class="input-group">
                    <label for="settings-system-prompt">System Prompt</label>
                    <textarea id="settings-system-prompt" rows="3" placeholder="You are a helpful assistant."></textarea>
                </div>
                <div class="input-group">
                    <label for="settings-models">Available Models (one per line)</label>
                    <textarea id="settings-models" rows="4" placeholder="mistralai/mistral-small-4-119b-2603"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn gradient-btn" id="save-settings-btn">Save & Close</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
